<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - GlamNest</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(rgba(75,15,26,0.85), rgba(75,15,26,0.85)),
                url('https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f') center/cover no-repeat;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.form-box {
    background: #fff;
    padding: 35px;
    border-radius: 15px;
    width: 350px;
}

h3 {
    color: #800020;
    text-align: center;
    margin-bottom: 20px;
}

.btn-custom {
    background: #800020;
    color: #fff;
    border-radius: 25px;
}

.btn-custom:hover {
    background: #4b0f1a;
}
</style>
</head>

<body>
<background image="E-commerce Jewellery\images\background image(bg)/bg-4.jpeg">
<div class="form-box">
    <h3>Login</h3>

    <form onsubmit="loginUser(event)">
        <input type="email" class="form-control mb-3" placeholder="Email" required>
        <input type="password" class="form-control mb-3" placeholder="Password" required>
        <input type="Confrim password" class="form-control mb-3" placeholder=" Confirm Password" required>


        <button class="btn btn-custom w-100">Login</button>
    </form>

    <p class="text-center mt-3">
        Don't have an account? 
        <a href="signup.html">Create Account</a>
    </p>
</div>

<script>
function loginUser(e){
    e.preventDefault();
    alert("Login Successful!");
    window.location.href = "index1.html";
}
</script>
</background>
</body>
</html>
