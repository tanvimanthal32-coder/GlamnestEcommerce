<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - GlamNest</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(rgba(75,15,26,0.85), rgba(75,15,26,0.85)),
                url('https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0') center/cover no-repeat;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.form-box {
    background: #fff;
    padding: 35px;
    border-radius: 15px;
    width: 350px;
}

h3 {
    color: #800020;
    text-align: center;
    margin-bottom: 20px;
}

.btn-custom {
    background: #800020;
    color: #fff;
    border-radius: 25px;
}

.btn-custom:hover {
    background: #4b0f1a;
}
</style>
</head>

<body>

<div class="form-box">
    <h3>Create Account</h3>

    <form onsubmit="signupUser(event)">
        <input type="text" class="form-control mb-3" placeholder="Full Name" required>
        <input type="email" class="form-control mb-3" placeholder="Email" required>
        <input type="tel" id="mobile" class="form-control mb-3" 
               placeholder="Mobile Number" 
               pattern="[0-9]{10}" 
               maxlength="10"
               required>

        <input type="password" class="form-control mb-3" placeholder="Password" required>
        <input type="password" class="form-control mb-3" placeholder=" Confirm Password" required>

        <button class="btn btn-custom w-100">Sign Up</button>
    </form>

    <p class="text-center mt-3">
        Already have an account? 
        <a href="login.html">Login</a>
    </p>
</div>

<script>
function signupUser(e){
    e.preventDefault();
    alert("Account Created Successfully!");
    window.location.href = "login.html";
}
</script>

</body>
</html>
